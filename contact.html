        <main>

            <section>
                <br><br><br>

                <fieldset>

                    <legend>Enter your contact information</legend>

                    <form>

                        <label for="Name">Enter your name:</label>
                        <input type="text" id="Name" name="Name" required placeholder="First and Last name"><br><br>

                        <label for="Email">Enter your email:</label>
                        <input type="email" id="Email" name="Email" required placeholder="e.g Meeple@gmail.com"><br><br>

                        <label for="PhoneNumber">Enter your phone number:</label>
                        <input type="tel" id="PhoneNumber" name="PhoneNumber" required><br><br>

                        <p>Why are you contacting us?</p>

                        <input type="radio" id="Issue" name="Contacting" required><br>
                        <label for="Inquire">I want to make an enquiry</label>
                        <input type="radio" id="Inquire" name="Contacting" required><br>
                        <label for="Service">Requesting your services</label>
                        <input type="radio" id="Service" name="Contacting" required><br>
                        <label for="Other">I have another reason</label>
                        <input type="radio" id="Other" name="Contacting" required><br><br>

                        <label for ='Describe'>Describe your issue</label>
                        <textarea placeholder="Describe your issue" required id="Describe"></textarea><br><br>

                        <button type="submit">Submit</button>
                    </form>
